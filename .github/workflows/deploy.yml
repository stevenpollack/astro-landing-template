name: Deploy

# Builds the site and deploys it to Cloudflare Workers on every push to main.
# Trigger manually too via the Actions tab ("Run workflow").
on:
  push:
    branches: [main]
    # Skip when a push touches only docs (root *.md matches files, not nested paths,
    # so future src/ markdown content still deploys). workflow_dispatch always runs.
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:

# Never run two deploys at once; cancel an in-progress run if a newer push lands.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      # Gate the deploy with the SAME commands as the local pre-push hook and CI.
      - name: Verify (lint + type-check + build)
        run: bun run verify

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E (preview deploy + Playwright smoke/submit/a11y)
        run: bun run e2e:preview

      - name: Deploy to Cloudflare Workers
        run: bunx wrangler deploy

      # Runtime config is the single source of truth in GitHub and is pushed to the
      # (now-existing) Worker on every deploy. The two credentials are GitHub secrets;
      # the mail addresses are non-sensitive GitHub variables.
      - name: Sync runtime config
        env:
          FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
        run: |
          set -euo pipefail
          put() {
            if [ -n "${2:-}" ]; then
              printf '%s' "$2" | bunx wrangler secret put "$1"
            else
              echo "::warning::$1 is not set in GitHub secrets — skipping"
            fi
          }
          put FASTMAIL_API_TOKEN   "${FASTMAIL_API_TOKEN:-}"
          put MAIL_FROM            "${MAIL_FROM:-}"
          put MAIL_TO              "${MAIL_TO:-}"
          put TURNSTILE_SECRET_KEY "${TURNSTILE_SECRET_KEY:-}"
