name: Deploy

# Builds the site and deploys it to Cloudflare Workers on every push to main.
# Trigger manually too via the Actions tab ("Run workflow").
on:
  push:
    branches: [main]
    # Skip when a push touches only docs (root *.md matches files, not nested paths,
    # so future src/ markdown content still deploys). workflow_dispatch always runs.
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:

# Never run two deploys at once; cancel an in-progress run if a newer push lands.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      # Gate the deploy with the SAME commands as the local pre-push hook and CI.
      - name: Verify (lint + type-check + build)
        run: bun run verify

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E (preview deploy + Playwright smoke/submit/a11y)
        run: bun run e2e:preview

      # Ships content only. The Worker's runtime secrets (Fastmail token, Turnstile
      # secret, mail addresses) and its custom domain are provisioned once by
      # `bun run bootstrap` and persist across deploys — wrangler never deletes a
      # secret or detaches a domain on deploy. Rotate a secret by re-running
      # bootstrap (or `wrangler secret put`) from your machine.
      - name: Deploy to Cloudflare Workers
        run: bunx wrangler deploy
