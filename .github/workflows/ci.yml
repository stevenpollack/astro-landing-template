name: CI

# Runs the SAME gate as the local pre-push hook and the Deploy workflow:
# `verify` (lint + type-check + build) then the e2e suite (preview deploy +
# Playwright smoke/submit/a11y). On PRs to main and pushes to non-main branches.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
  push:
    branches-ignore: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      - name: Verify (lint + type-check + build)
        run: bun run verify

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E (preview deploy + Playwright smoke/submit/a11y)
        run: bun run e2e:preview
