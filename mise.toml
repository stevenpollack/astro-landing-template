# Pins the runtime. `mise install` provides bun; `bun install` then pulls all JS
# tooling (biome, lefthook, playwright, …) as devDependencies — so the same versions
# are used locally and in CI without mise needing to be present there.
[tools]
bun = "1.3"

[env]
# Auto-load .env into the shell on `cd`, so bare `wrangler` / `gh` commands see your
# secrets too (bun, Alchemy and the bootstrap already load .env themselves). A missing
# .env is tolerated, and mise isn't used in CI — this is purely a local convenience.
_.file = ".env"
