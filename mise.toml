# Pins the runtime. `mise install` provides bun; `bun install` then pulls all JS
# tooling (biome, lefthook, playwright, …) as devDependencies — so the same versions
# are used locally and in CI without mise needing to be present there.
#
# .env is intentionally NOT loaded here. Bun ingests .env on every invocation
# (`bun run …`, `bunx …`, spawned children inherit it), so the dev/bootstrap/deploy
# paths already see it — freshly, per run. Exporting .env into the long-lived shell
# instead (mise `[env]._.file`) lets a stale shell value shadow an edited .env (an
# already-set var beats Bun's .env load), which is what produced a spurious 401, and
# it force-feeds GITHUB_TOKEN to the `gh` CLI. One loader (Bun) keeps it fresh.
[tools]
# Pinned exact: bun 1.3.14 segfaults running the Alchemy program (`bun run
# bootstrap`). 1.3.13 is the latest that works — bump when Bun fixes it.
bun = "1.3.13"
